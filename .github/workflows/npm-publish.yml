name: Publish Plugin to npm

on:
  push:
    tags:
      - "plugin-v*" # e.g. plugin-v0.1.0 — created by `pnpm release` in plugin/

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Requires a "Release" GitHub Environment with NPM_TOKEN secret set.
    # Adds a required-reviewer approval gate before any publish runs.
    environment: Release
    permissions:
      contents: read
      id-token: write # Required for npm provenance attestation

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: "9"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          # Automatically writes ~/.npmrc with NODE_AUTH_TOKEN binding
          registry-url: https://registry.npmjs.org/

      - name: Install plugin dependencies
        working-directory: plugin
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: plugin
        run: pnpm run build

      - name: Run tests
        working-directory: plugin
        run: pnpm test

      - name: Publish
        working-directory: plugin
        # --provenance: attach a signed build attestation (verifiable via `npm audit signatures`)
        # --access public: required for scoped packages; harmless for unscoped
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
